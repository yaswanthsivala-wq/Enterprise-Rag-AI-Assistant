<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6fb; --card:#ffffff; --border:rgba(15,23,42,.08);
  --text:#0f172a; --muted:#64748b;
  --accent:#6d5efc; --accent2:#9333ea;
  --grad:linear-gradient(135deg,#6d5efc,#9333ea);
  --side-grad:linear-gradient(180deg,#0c1526 0%,#0e1a33 100%);
  --side-text:#dbe2f0; --side-muted:#8593ad; --side-item:rgba(255,255,255,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.layout{display:flex;height:100vh}

/* ---------- Sidebar ---------- */
.sidebar{width:290px;flex-shrink:0;background:var(--side-grad);color:var(--side-text);
  display:flex;flex-direction:column;padding:20px 16px;gap:18px}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:42px;height:42px;border-radius:12px;background:var(--grad);
  display:grid;place-items:center;color:#fff;box-shadow:0 6px 18px rgba(109,94,252,.45)}
.brand-title{font-weight:700;font-size:16px;color:#fff}
.brand-sub{font-size:12px;color:var(--side-muted)}
.new-chat{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  padding:12px;border:none;border-radius:12px;background:var(--grad);color:#fff;
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.new-chat:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(109,94,252,.4)}
.side-section{display:flex;flex-direction:column;gap:6px}
.side-label{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--side-muted);
  padding:0 6px;margin-bottom:2px;font-weight:600}
.doc-list{display:flex;flex-direction:column;gap:4px;max-height:210px;overflow-y:auto}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;
  font-size:13px;color:var(--side-text);cursor:default;transition:.15s;white-space:nowrap;overflow:hidden}
.doc-item span{overflow:hidden;text-overflow:ellipsis}
.doc-item:hover{background:var(--side-item)}
.doc-item svg{flex-shrink:0;color:#9db0d6}
.doc-empty{font-size:12.5px;color:var(--side-muted);padding:8px 10px;line-height:1.5}
.quick{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:11px;border:none;border-radius:11px;background:var(--side-item);color:var(--side-text);
  font-family:inherit;cursor:pointer;transition:.15s}
.quick:hover{background:rgba(255,255,255,.1)}
.quick svg{flex-shrink:0;color:#b3a6ff}
.quick-t{font-size:13.5px;font-weight:600;color:#fff}
.quick-s{font-size:11.5px;color:var(--side-muted)}
.side-spacer{flex:1}
.status-card{display:flex;align-items:center;gap:11px;padding:12px;border-radius:12px;
  background:var(--side-item);border:1px solid rgba(255,255,255,.06)}
.status-dot{width:9px;height:9px;border-radius:50%;background:#f59e0b;flex-shrink:0;
  box-shadow:0 0 0 3px rgba(245,158,11,.18)}
.status-dot.ok{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.18)}
.status-t{font-size:13px;font-weight:600;color:#fff}
.status-s{font-size:11.5px;color:var(--side-muted)}

/* ---------- Main ---------- */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;
  border-bottom:1px solid var(--border);background:#fff}
.greet{display:flex;align-items:center;gap:13px}
.greet-avatar{width:44px;height:44px;border-radius:12px;background:var(--grad);
  display:grid;place-items:center;color:#fff}
.greet-title{font-size:18px;font-weight:700}
.greet-sub{font-size:13px;color:var(--muted)}
.online{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;
  background:#f1f5f9;font-size:12.5px;font-weight:600;color:#475569}
.online-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b}
.online-dot.ok{background:#22c55e}

.chat{flex:1;overflow-y:auto;padding:26px 28px;display:flex;flex-direction:column;gap:20px}
.row{display:flex;gap:12px;max-width:820px;animation:fade .25s ease}
.row.user{align-self:flex-end;flex-direction:row-reverse}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;color:#fff}
.avatar.bot{background:var(--grad)}
.avatar.me{background:#1e293b;font-size:12px;font-weight:700}
.bubble{padding:15px 18px;border-radius:16px;line-height:1.65;font-size:14.5px}
.row.bot .bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:5px;
  box-shadow:0 2px 10px rgba(15,23,42,.04)}
.row.user .bubble{background:var(--grad);color:#fff;border-top-right-radius:5px}
.bubble .who{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px}
.row.user .bubble .who{color:rgba(255,255,255,.8)}
.sources{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.sources b{color:#334155}
.sources .src{display:block;margin-top:3px}

.sys{align-self:center;font-size:12.5px;color:var(--muted);background:#eef1f8;
  padding:7px 14px;border-radius:999px;border:1px solid var(--border)}
.sys.err{background:#fef2f2;color:#b91c1c;border-color:#fecaca}

.dots{display:inline-flex;gap:4px;align-items:center}
.dots i{width:7px;height:7px;border-radius:50%;background:#c4b5fd;animation:blink 1.2s infinite}
.dots i:nth-child(2){animation-delay:.2s}.dots i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* ---------- Composer ---------- */
.composer{padding:14px 28px 18px;border-top:1px solid var(--border);background:#fff}
.chips{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:12px}
.chip{border:1px solid var(--border);background:#fff;padding:8px 14px;border-radius:999px;
  font-size:12.5px;font-family:inherit;color:#334155;cursor:pointer;transition:.15s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:#faf9ff}
.input-bar{display:flex;align-items:center;gap:8px;border:1px solid var(--border);
  border-radius:16px;padding:8px 8px 8px 12px;background:#fff;transition:.15s}
.input-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(109,94,252,.1)}
.input-bar input{flex:1;border:none;outline:none;font-family:inherit;font-size:14.5px;
  background:transparent;color:var(--text);padding:8px 4px}
.icon-btn{width:38px;height:38px;border:none;border-radius:10px;background:transparent;
  color:var(--muted);cursor:pointer;display:grid;place-items:center;transition:.15s}
.icon-btn:hover{background:#f1f5f9;color:var(--accent)}
.send{width:40px;height:40px;border:none;border-radius:11px;background:var(--grad);color:#fff;
  cursor:pointer;display:grid;place-items:center;transition:.2s}
.send:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(109,94,252,.4)}
.disclaimer{text-align:center;font-size:11.5px;color:#94a3b8;margin-top:11px}

@media(max-width:860px){
  .sidebar{width:76px;padding:16px 10px}
  .brand-title,.brand-sub,.side-label,.quick-t,.quick-s,.doc-item span,.status-t,.status-s,.new-chat span{display:none}
  .new-chat{padding:12px 0}.quick{justify-content:center}.status-card{justify-content:center}
}
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><path d="M9 13h.01M15 13h.01"/><path d="M2 14v2M22 14v2"/></svg>
      </div>
      <div><div class="brand-title">RAG Assistant</div><div class="brand-sub">AI-Powered Knowledge</div></div>
    </div>

    <button class="new-chat" onclick="clearChat()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span>New chat</span>
    </button>

    <div class="side-section">
      <div class="side-label">Knowledge base</div>
      <div id="document-list" class="doc-list"></div>
    </div>

    <div class="side-section">
      <div class="side-label">Quick actions</div>
      <button class="quick" onclick="triggerUpload()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 13v8"/><path d="m8 17 4-4 4 4"/><path d="M20 16.6A5 5 0 0 0 18 7h-1.3A8 8 0 1 0 4 15"/></svg>
        <div><div class="quick-t">Upload documents</div><div class="quick-s">Add PDFs to the knowledge base</div></div>
      </button>
      <button class="quick" onclick="clearChat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        <div><div class="quick-t">Clear chat</div><div class="quick-s">Start a fresh conversation</div></div>
      </button>
    </div>

    <div class="side-spacer"></div>

    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <div><div class="status-t" id="statusText">Checking…</div><div class="status-s">Groq · local</div></div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="greet">
        <div class="greet-avatar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><path d="M9 13h.01M15 13h.01"/><path d="M2 14v2M22 14v2"/></svg>
        </div>
        <div><div class="greet-title">Hello there 👋</div><div class="greet-sub">Ask anything about your uploaded documents.</div></div>
      </div>
      <div class="topbar-right">
        <span class="online"><span class="online-dot" id="onlineDot"></span><span id="onlineText">Connecting…</span></span>
      </div>
    </header>

    <div class="chat" id="messages"></div>

    <div class="composer">
      <div class="chips" id="chips"></div>
      <div class="input-bar">
        <button class="icon-btn" title="Attach PDF" onclick="triggerUpload()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a5 5 0 0 1-7.07-7.07l9.19-9.19a3.5 3.5 0 0 1 4.95 4.95l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input id="question" placeholder="Ask a question about your documents…" autocomplete="off"
               onkeydown="if(event.key==='Enter')askQuestion()">
        <button class="send" onclick="askQuestion()" title="Send">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <div class="disclaimer">RAG Assistant can make mistakes. Verify important information.</div>
    </div>

    <input type="file" id="pdfFile" accept=".pdf" multiple hidden onchange="uploadPDF()">
  </main>
</div>

<script>
const BOT_ICON='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="11" rx="3"/><path d="M12 8V4"/><circle cx="12" cy="3" r="1"/><path d="M9 13h.01M15 13h.01"/><path d="M2 14v2M22 14v2"/></svg>';
const USER_ICON='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
const FILE_ICON='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/></svg>';

const messagesEl=document.getElementById("messages");

function scrollDown(){messagesEl.scrollTop=messagesEl.scrollHeight;}

// ---- render a chat message safely (dynamic text via textContent) ----
function addMessage(text,type,sources){
  const row=document.createElement("div");
  row.className="row "+(type==="user"?"user":"bot");

  const avatar=document.createElement("div");
  avatar.className="avatar "+(type==="user"?"me":"bot");
  avatar.innerHTML=type==="user"?USER_ICON:BOT_ICON;

  const bubble=document.createElement("div");
  bubble.className="bubble";

  const who=document.createElement("div");
  who.className="who";
  who.textContent=type==="user"?"You":"Assistant";
  bubble.appendChild(who);

  const body=document.createElement("div");
  body.textContent=text;                 // safe: no HTML injection
  bubble.appendChild(body);

  if(sources&&sources.length){
    const s=document.createElement("div");
    s.className="sources";
    const b=document.createElement("b");
    b.textContent="Sources";
    s.appendChild(b);
    sources.forEach(src=>{
      const line=document.createElement("span");
      line.className="src";
      line.textContent=src;
      s.appendChild(line);
    });
    bubble.appendChild(s);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollDown();
  return row;
}

function addSystem(text,isError){
  const el=document.createElement("div");
  el.className="sys"+(isError?" err":"");
  el.textContent=text;
  messagesEl.appendChild(el);
  scrollDown();
}

// ---- ask ----
async function askQuestion(){
  const input=document.getElementById("question");
  const question=input.value.trim();
  if(!question)return;
  addMessage(question,"user");
  input.value="";

  const loading=addMessage("","bot");
  loading.querySelector(".bubble > div:last-child").innerHTML=
    '<span class="dots"><i></i><i></i><i></i></span>';

  try{
    const res=await fetch("/ask",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({question})});
    const data=await res.json();
    loading.remove();
    addMessage(data.answer||data.error||"No response.","bot",data.sources||[]);
  }catch(err){
    console.error(err);
    loading.remove();
    addMessage("Couldn't reach the server. Is the app still running?","bot");
  }
}

// ---- upload ----
function triggerUpload(){document.getElementById("pdfFile").click();}

async function uploadPDF(){
  const fileInput=document.getElementById("pdfFile");
  const files=fileInput.files;
  if(!files.length)return;
  const names=Array.from(files).map(f=>f.name).join(", ");
  addSystem("Uploading "+names+" …");

  const form=new FormData();
  for(const f of files)form.append("files",f);

  try{
    const res=await fetch("/upload",{method:"POST",body:form});
    const data=await res.json();
    // replace the "uploading" note with the result
    const last=messagesEl.querySelector(".sys:last-of-type");
    if(last)last.remove();
    if(data.error){addSystem(data.error,true);}
    else{addSystem(data.message||"Upload complete.");}
    loadDocuments();
  }catch(err){
    console.error(err);
    addSystem("Upload failed. Please try again.",true);
  }
  fileInput.value="";   // allow re-uploading the same file
}

// ---- new chat / clear ----
async function clearChat(){
  messagesEl.innerHTML="";
  try{await fetch("/clear-memory",{method:"POST"});}catch(err){console.error(err);}
  welcome();
}

// ---- documents (sidebar) ----
async function loadDocuments(){
  try{
    const res=await fetch("/documents");
    const files=await res.json();
    const list=document.getElementById("document-list");
    list.innerHTML="";
    if(!files.length){
      const empty=document.createElement("div");
      empty.className="doc-empty";
      empty.textContent="No documents yet. Upload a PDF to get started.";
      list.appendChild(empty);
      return;
    }
    files.forEach(name=>{
      const item=document.createElement("div");
      item.className="doc-item";
      item.innerHTML=FILE_ICON;          // static icon
      const label=document.createElement("span");
      label.textContent=name;            // safe filename rendering
      item.appendChild(label);
      list.appendChild(item);
    });
  }catch(err){console.error(err);}
}

// ---- health / online status ----
async function checkHealth(){
  try{
    const res=await fetch("/health");
    const h=await res.json();
    const ok=h.llm_configured;
    document.getElementById("onlineDot").classList.toggle("ok",ok);
    document.getElementById("statusDot").classList.toggle("ok",ok);
    document.getElementById("onlineText").textContent=ok?"Online":"No API key";
    document.getElementById("statusText").textContent=ok?"Connected":"Add GROQ_API_KEY";
  }catch(err){
    document.getElementById("onlineText").textContent="Offline";
    document.getElementById("statusText").textContent="Server offline";
  }
}

// ---- welcome / chips ----
const SUGGESTIONS=["What is in the document?","Give me a summary","What are the key points?","List any dates or deadlines"];

function welcome(){
  addMessage("Hi! I'm your RAG assistant. Upload a PDF from the sidebar or the paperclip, then ask me anything about it — I'll answer using the document and cite my sources.","bot");
}

function renderChips(){
  const box=document.getElementById("chips");
  box.innerHTML="";
  SUGGESTIONS.forEach(q=>{
    const c=document.createElement("button");
    c.className="chip";
    c.textContent=q;
    c.onclick=()=>{document.getElementById("question").value=q;askQuestion();};
    box.appendChild(c);
  });
}

// ---- init ----
renderChips();
welcome();
loadDocuments();
checkHealth();
</script>
</body>
</html>
