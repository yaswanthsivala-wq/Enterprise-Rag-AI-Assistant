app = "enterprise-rag-assistant"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WEB_CONCURRENCY = "1"
  UPLOAD_FOLDER = "/data/uploads"
  VECTOR_DB = "/data/vector_store"

# Persistent volume so the FAISS index and uploads survive restarts.
# Create once with:  fly volumes create rag_data --size 1
[[mounts]]
  source = "rag_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "45s"
    interval = "30s"
    method = "get"
    path = "/health"
    timeout = "5s"

# FastEmbed + FAISS need headroom; 256MB will OOM.
[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
